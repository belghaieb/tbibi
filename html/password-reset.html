<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe - TBIBI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">

    <link rel="stylesheet" href="../css/stylelogin.css">
</head>
<body>
    <div class="auth-container">
        <div class="card shadow-lg p-md-5 p-4 text-center auth-card">
            <h1 class="site-logo mb-2 text-primary-theme">TBIBI</h1>
            <p class="mb-4 text-muted" id="intro-text">Entrez votre email pour recevoir un lien de réinitialisation.</p>

            <form id="reset-form">
                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="email" placeholder=" " required>
                    <label for="email">Adresse Email</label>
                </div>

                <button type="submit" class="btn btn-primary-theme w-100 btn-lg">Envoyer le lien</button>
            </form>

            <hr class="my-4" id="form-separator">

            <p class="text-center text-muted" id="login-link-container">
                Retour à la connexion ?
                <a href="login.html" class="text-success fw-bold">Se connecter</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
    <script src="../js/password-reset-page.js"></script>
</body>
</html>
