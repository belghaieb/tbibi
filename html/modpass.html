<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de Passe Oublié - TBIBI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          crossorigin="anonymous">
          
    <link rel="stylesheet" href="../css/modpass.css"> 
</head>
<body>
    
    <div class="auth-container">
        <div class="card shadow-lg p-md-5 p-4 text-center auth-card">
            
            <h1 class="site-logo mb-2 text-primary-theme">TBIBI</h1>
            <h2 class="h5 mb-4 text-primary-theme">Réinitialiser Votre Mot de Passe</h2>

            <p class="mb-4 text-muted small" id="intro-text">
                Veuillez entrer l'adresse email associée à votre compte. 
                Nous simulerons l'envoi d'un lien de réinitialisation.
            </p>

            <form id="reset-form" action="#" method="POST">
                
                <div class="form-floating mb-4 text-start">
                    <input type="email" class="form-control" id="email" name="user_email" placeholder=" " required>
                    <label for="email">Adresse Email</label>
                </div>
                
                <button type="submit" class="btn btn-primary-theme w-100 btn-lg">
                    Envoyer le Lien de Réinitialisation
                </button>
            </form>
            
            <hr class="my-4" id="form-separator">
            
            <p class="text-center text-muted" id="login-link-container">
                <a href="login.html" class="text-primary-theme fw-bold">← Retour à la Connexion</a>
            </p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            crossorigin="anonymous"></script>
</body>
</html>
